<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Resume</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #222;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #444;
      display: flex;
      justify-content: center;
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }
    nav a:hover {
      background: #666;
    }
    section {
      padding: 40px;
      max-width: 900px;
      margin: auto;
      background: white;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    .skills span {
      display: inline-block;
      background: #007bff;
      color: white;
      padding: 5px 10px;
      margin: 5px;
      border-radius: 5px;
    }
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      background: #222;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1 id="name">陳品婕</h1>
  <p id="title">Your Title / 學生</p>
</header>

<nav>
  <a href="#about">關於我</a>
  <a href="#experience">經歷</a>
  <a href="#skills">技能</a>
  <a href="#contact">聯絡</a>
</nav>

<section id="about">
  <h2>關於我</h2>
  <p>在這裡寫你的自我介紹...</p>
</section>

<section id="experience">
  <h2>經歷</h2>
  <ul>
    <li>公司 A - 職位 (2023 - 2024)</li>
    <li>專案 B - 簡單描述</li>
  </ul>
</section>

<section id="skills">
  <h2>技能</h2>
  <div class="skills">
    <span>Python</span>
    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
  </div>
</section>

<section id="contact">
  <h2>聯絡</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script>
  // 平滑滾動
  document.querySelectorAll('nav a').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelector(this.getAttribute('href')).scrollIntoView({
        behavior: 'smooth'
      });
    });
  });
</script>

</body>
</html>
